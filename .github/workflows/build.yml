name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build RunnerTray.app
    runs-on: [self-hosted, macOS, ARM64]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for tag counting

      - name: Determine version
        id: version
        run: |
          BUILD_NUMBER=$(git rev-list --count HEAD)
          VERSION="1.0.${BUILD_NUMBER}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "📌 Version: $VERSION (build #$BUILD_NUMBER)"

      - name: Select Xcode
        run: |
          xcodebuild -version

      - name: Generate App Icon
        run: |
          # Create icon directory
          ICON_DIR="RunnerTray/Resources/Assets.xcassets/AppIcon.appiconset"
          mkdir -p "$ICON_DIR"

          # Download GitHub octocat logo as base
          curl -sL "https://github.githubassets.com/assets/GitHub-Mark-ea2971cee799.png" -o /tmp/github.png

          # Generate all required sizes using sips (macOS built-in)
          for size in 16 32 64 128 256 512; do
            double=$((size * 2))
            sips -z $size $size /tmp/github.png --out "$ICON_DIR/icon_${size}x${size}.png" >/dev/null 2>&1
            sips -z $double $double /tmp/github.png --out "$ICON_DIR/icon_${size}x${size}@2x.png" >/dev/null 2>&1
          done
          # 1024 for @2x of 512
          sips -z 1024 1024 /tmp/github.png --out "$ICON_DIR/icon_1024.png" >/dev/null 2>&1

          # Create Contents.json
          cat > "$ICON_DIR/Contents.json" << 'JSONEOF'
          {
            "images" : [
              {"size" : "16x16", "idiom" : "mac", "filename" : "icon_16x16.png", "scale" : "1x"},
              {"size" : "16x16", "idiom" : "mac", "filename" : "icon_16x16@2x.png", "scale" : "2x"},
              {"size" : "32x32", "idiom" : "mac", "filename" : "icon_32x32.png", "scale" : "1x"},
              {"size" : "32x32", "idiom" : "mac", "filename" : "icon_32x32@2x.png", "scale" : "2x"},
              {"size" : "128x128", "idiom" : "mac", "filename" : "icon_128x128.png", "scale" : "1x"},
              {"size" : "128x128", "idiom" : "mac", "filename" : "icon_128x128@2x.png", "scale" : "2x"},
              {"size" : "256x256", "idiom" : "mac", "filename" : "icon_256x256.png", "scale" : "1x"},
              {"size" : "256x256", "idiom" : "mac", "filename" : "icon_256x256@2x.png", "scale" : "2x"},
              {"size" : "512x512", "idiom" : "mac", "filename" : "icon_512x512.png", "scale" : "1x"},
              {"size" : "512x512", "idiom" : "mac", "filename" : "icon_1024.png", "scale" : "2x"}
            ],
            "info" : {"version" : 1, "author" : "xcode"}
          }
          JSONEOF

          echo "✅ App icon generated from GitHub logo"

      - name: Build Release
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUILD="${{ steps.version.outputs.build }}"
          xcodebuild \
            -project RunnerTray.xcodeproj \
            -scheme RunnerTray \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            -destination 'platform=macOS,arch=arm64' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD" \
            clean build

      - name: Create DMG
        run: |
          APP_PATH="build/DerivedData/Build/Products/Release/RunnerTray.app"
          VERSION="${{ steps.version.outputs.version }}"
          DMG_NAME="RunnerTray-${VERSION}.dmg"

          if [ ! -d "$APP_PATH" ]; then
            echo "❌ RunnerTray.app not found"
            exit 1
          fi

          # Ad-hoc sign the app (no developer account needed)
          codesign --force --deep --sign - "$APP_PATH"
          echo "✅ Ad-hoc signed"

          # Create DMG with Applications symlink for drag-and-drop install
          DMG_DIR=$(mktemp -d)
          cp -R "$APP_PATH" "$DMG_DIR/"
          ln -s /Applications "$DMG_DIR/Applications"

          hdiutil create -volname "RunnerTray $VERSION" \
            -srcfolder "$DMG_DIR" \
            -ov -format UDZO \
            "$GITHUB_WORKSPACE/$DMG_NAME"

          rm -rf "$DMG_DIR"
          echo "📦 Created: $DMG_NAME ($(du -h "$GITHUB_WORKSPACE/$DMG_NAME" | cut -f1))"
          echo "dmg_name=$DMG_NAME" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RunnerTray-${{ steps.version.outputs.version }}
          path: ${{ env.dmg_name }}
          retention-days: 30

      - name: Create Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"
          DMG="${{ env.dmg_name }}"

          # Create tag
          git tag "$TAG"
          git push origin "$TAG"

          # Create release via GitHub API
          RELEASE_JSON=$(curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            -d "{\"tag_name\":\"$TAG\",\"name\":\"RunnerTray $VERSION\",\"generate_release_notes\":true}")

          UPLOAD_URL=$(echo "$RELEASE_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['upload_url'].split('{')[0])")
          echo "Upload URL: $UPLOAD_URL"

          # Upload DMG
          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            "${UPLOAD_URL}?name=${DMG}&label=RunnerTray+Installer" \
            --data-binary "@${DMG}"

          echo "✅ Release $TAG created with $DMG"
